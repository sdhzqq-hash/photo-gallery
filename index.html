<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SS模型库 - Stable Diffusion 模型展示平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 顶部导航 -->
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">SS模型库</a>
      <nav class="nav">
        <a href="#" class="nav-link active" data-type="all">全部</a>
        <a href="#" class="nav-link" data-type="Checkpoint">大模型</a>
        <a href="#" class="nav-link" data-type="LoRA">LoRA</a>
        <a href="#" class="nav-link" data-type="Embedding">Embedding</a>
        <a href="#" class="nav-link" data-type="VAE">VAE</a>
        <a href="#" class="nav-link" data-type="Workflow">工作流</a>
      </nav>
      <div class="header-right">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索模型、作者、底模、标签...">
          <button id="searchBtn">🔍</button>
        </div>
      </div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="main container">

    <!-- 热门作者 -->
    <section class="section">
      <h2 class="section-title">
        <span>热门作者</span>
        <a href="#" class="more">更多 &gt;</a>
      </h2>
      <div class="authors-scroll" id="authorsList">
        <!-- JS 动态生成 -->
      </div>
    </section>

    <!-- 模型列表 -->
    <section class="section">
      <h2 class="section-title">
        <span>模型列表</span>
        <div class="section-title-right">
          <!-- 底模筛选 -->
          <div class="base-filter">
            <button class="base-btn active" data-base="all">全部底模</button>
            <button class="base-btn" data-base="SDXL">SDXL</button>
            <button class="base-btn" data-base="SD 1.5">SD 1.5</button>
            <button class="base-btn" data-base="Pony">Pony</button>
            <button class="base-btn" data-base="Flux">Flux</button>
            <button class="base-btn" data-base="Illustrious">Illustrious</button>
            <button class="base-btn" data-base="Anima">Anima</button>
            <button class="base-btn" data-base="WAN">WAN</button>
          </div>
          <div class="sort-tabs">
            <button class="sort-tab active" data-sort="latest">最新</button>
            <button class="sort-tab" data-sort="popular">最热</button>
            <button class="sort-tab" data-sort="downloads">下载最多</button>
          </div>
        </div>
      </h2>
      <div class="model-grid" id="modelGrid">
        <!-- JS 动态生成 -->
      </div>
      <!-- 加载更多 -->
      <div class="load-more-wrap">
        <button class="load-more" id="loadMoreBtn">加载更多</button>
      </div>
    </section>

  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 SS模型库 - Stable Diffusion 模型展示平台</p>
      <p class="footer-sub">本站为模型信息展示平台，模型文件请前往对应原链接下载。</p>
    </div>
  </footer>

  <!-- 模型详情弹窗 -->
  <div class="modal-overlay" id="modelModal">
    <div class="modal" id="modalContent">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-body" id="modalBody">
        <!-- JS 动态生成 -->
      </div>
    </div>
  </div>

  <!-- 回到顶部 -->
  <button class="back-to-top" id="backToTop">↑</button>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
